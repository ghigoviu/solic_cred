apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: credit-mvp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # We will assume a docker image is built and pushed to a registry.
        image: credit-mvp-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: core-config
        - secretRef:
            name: core-secret

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: credit-mvp
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: backend
