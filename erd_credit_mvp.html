
<style>
#erd { width: 100%; overflow-x: auto; padding: 0.5rem 0; }
#erd svg { max-width: 100%; }
#legend { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 1rem; padding: 0.75rem 1rem; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); }
.leg-item { display: flex; align-items: center; gap: 0.5rem; font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-sans); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.core   { background: #B5D4F4; }
.infra  { background: #9FE1CB; }
.audit  { background: #FAC775; }
</style>
<h2 class="sr-only">Diagrama entidad-relación del sistema de solicitudes de crédito multi-país. Cinco tablas: customer, credit_request, status_timeline, jobs y audit_log.</h2>
<div id="erd"></div>
<div id="legend">
  <div class="leg-item"><div class="leg-dot core"></div>Dominio principal</div>
  <div class="leg-item"><div class="leg-dot infra"></div>Procesamiento async</div>
  <div class="leg-item"><div class="leg-dot audit"></div>Auditoría</div>
  <div class="leg-item" style="margin-left:auto; font-style:italic;">PK = clave primaria · FK = clave foránea</div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor:  dark ? '#9c9a92' : '#73726c',
    textColor:  dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor:      dark ? '#0C447C' : '#E6F1FB',
    primaryTextColor:  dark ? '#B5D4F4' : '#0C447C',
    primaryBorderColor:dark ? '#185FA5' : '#185FA5',
    secondaryColor:       dark ? '#085041' : '#E1F5EE',
    secondaryTextColor:   dark ? '#9FE1CB' : '#085041',
    secondaryBorderColor: dark ? '#0F6E56' : '#0F6E56',
    tertiaryColor:       dark ? '#633806' : '#FAEEDA',
    tertiaryTextColor:   dark ? '#FAC775' : '#633806',
    tertiaryBorderColor: dark ? '#854F0B' : '#854F0B',
  },
});

const diagram = `erDiagram
  customer {
    uuid      id            PK
    varchar   full_name
    bytea     encrypted_doc
    varchar   doc_type
    varchar   doc_masked
    numeric   monthly_income
    timestamptz created_at
  }

  credit_request {
    uuid        id          PK
    char        country
    varchar     status
    uuid        customer_id FK
    numeric     amount
    char        currency
    jsonb       bank_info
    timestamptz created_at
    timestamptz updated_at
  }

  status_timeline {
    uuid        id         PK
    uuid        request_id FK
    varchar     from_status
    varchar     to_status
    uuid        changed_by
    text        comment
    timestamptz created_at
  }

  jobs {
    bigserial   id          PK
    varchar     queue
    jsonb       payload
    varchar     status
    int         attempts
    timestamptz created_at
    timestamptz processed_at
  }

  audit_log {
    bigserial   id         PK
    varchar     entity
    uuid        entity_id
    varchar     action
    uuid        actor_id
    jsonb       payload
    bigint      tx_id
    timestamptz created_at
  }

  customer       ||--o{ credit_request  : "tiene"
  credit_request ||--o{ status_timeline : "registra"
  credit_request ||--o{ jobs            : "genera"
  credit_request ||--o{ audit_log       : "audita"
`;

const { svg } = await mermaid.render('erd-inner', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll(
  '#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path, ' +
  '#erd svg.erDiagram .row-rect-odd rect, #erd svg.erDiagram .row-rect-even rect'
).forEach(el => { el.setAttribute('stroke', 'none'); });
</script>
